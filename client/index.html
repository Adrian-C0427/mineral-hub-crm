<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mineral Hub CRM</title>
    <!-- Brand typeface (design system: Manrope). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Apply the saved theme before first paint so there's no dark→light flash.
         The server profile is the cross-device source of truth (reconciled after
         login); localStorage mirrors it for instant application on load. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("mh-theme");
          if (t !== "light" && t !== "dark") t = "dark";
          document.documentElement.dataset.theme = t;
          document.documentElement.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
